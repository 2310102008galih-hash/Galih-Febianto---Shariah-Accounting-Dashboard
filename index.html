<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravel Tamasya - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'gravel-green': '#1A4D2E',
                        'gravel-terracotta': '#C66F4B',
                        'gravel-amber': '#DAA520',
                        'gravel-gold': '#FBBF24',
                        'gravel-dark': '#111827',
                    }
                }
            }
        }
    </script>
    
    <style>
        .login-screen { background-color: #1A4D2E; }
        .dashboard-screen { display: none; background-color: #F3F4F6; }
        .data-card { background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 16px; }
        .sidebar-item.active { background-color: rgba(255, 255, 255, 0.1); color: #FBBF24; font-weight: 600; }
        .page-content { display: none; }
        .page-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="font-sans antialiased text-gravel-dark">

    <div id="loginPage" class="login-screen min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-white/20">
                    <i class="fas fa-bicycle text-gravel-gold text-3xl"></i>
                </div>
                <h1 class="text-white text-2xl font-black tracking-tighter uppercase">Gravel Tamasya</h1>
                <p class="text-white/60 text-sm italic">Sparepart & Service Syariah</p>
            </div>

            <div class="bg-white rounded-3xl p-8 shadow-2xl overflow-hidden relative">
                <div class="absolute top-0 left-0 w-full h-1 bg-gravel-amber"></div>
                
                <div class="mb-8">
                    <h2 class="text-xl font-extrabold text-gravel-dark">Selamat Datang</h2>
                    <p class="text-sm text-gray-500 font-medium">Memperlancar proses penjualan</p>
                </div>

                <form id="authForm" class="space-y-5" onsubmit="handleLogin(event)">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">ID / Email</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                                <i class="far fa-envelope"></i>
                            </span>
                            <input type="text" id="userID" required 
                                class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-gravel-green focus:ring-1 focus:ring-gravel-green outline-none transition-all text-sm font-semibold"
                                placeholder="Masukkan ID atau Email">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                                <i class="far fa-lock"></i>
                            </span>
                            <input type="password" id="userPass" required
                                class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-gravel-green focus:ring-1 focus:ring-gravel-green outline-none transition-all text-sm font-semibold"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" 
                        class="w-full bg-gravel-green hover:bg-gravel-dark text-white font-bold py-4 rounded-xl shadow-lg transition-all uppercase text-xs tracking-widest mt-4">
                        Masuk Dashboard
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-gray-100 flex justify-between items-center">
                    <span class="text-[10px] text-gray-400 font-bold uppercase">Sistem Keamanan Terpadu</span>
                    <i class="fas fa-shield-halved text-gravel-amber"></i>
                </div>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="dashboard-screen h-screen flex overflow-hidden">
        <aside class="w-20 md:w-64 bg-gravel-green flex flex-col items-center py-8 border-r border-black/10">
            <div class="mb-12 text-center">
                <div class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center mx-auto">
                    <i class="fas fa-dot-circle text-gravel-gold text-xl"></i>
                </div>
                <p class="hidden md:block mt-4 text-[10px] font-black tracking-widest text-white uppercase px-2">Gravel Tamasya</p>
            </div>
            <nav class="flex-1 w-full px-4 space-y-2">
                <button onclick="showPage('overview', this)" class="sidebar-item active w-full py-3.5 px-5 flex items-center gap-4 rounded-xl text-sm">
                    <i class="fas fa-tachometer-alt w-5 text-center"></i>
                    <span class="hidden md:block">Monitor</span>
                </button>
                <button onclick="showPage('pos', this)" class="sidebar-item w-full py-3.5 px-5 flex items-center gap-4 rounded-xl text-sm">
                    <i class="fas fa-cash-register w-5 text-center"></i>
                    <span class="hidden md:block">Kasir Part</span>
                </button>
                <button onclick="logout()" class="w-full py-3.5 px-5 flex items-center gap-4 rounded-xl text-sm text-red-300 hover:bg-red-900/20 mt-10">
                    <i class="fas fa-power-off w-5 text-center"></i>
                    <span class="hidden md:block">Keluar</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-white border-b border-gray-200 py-6 px-12 flex justify-between items-center sticky top-0 z-10">
                <div>
                    <h1 class="text-2xl font-extrabold text-gravel-dark tracking-tighter" id="pageTitle">Overview Bisnis</h1>
                    <p id="tanggal" class="text-xs text-gray-400 font-medium"></p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right hidden md:block">
                        <p class="text-sm font-bold text-gravel-dark" id="displayUser">Admin</p>
                        <p class="text-[10px] text-gravel-green font-bold uppercase tracking-widest">Active Session</p>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=GT&background=1A4D2E&color=FBBF24" class="w-10 h-10 rounded-full border border-gray-200">
                </div>
            </header>

            <div class="p-12">
                <div id="overview" class="page-content active">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div class="data-card p-8 border-l-4 border-gravel-green">
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Penjualan Hari Ini</p>
                            <h2 class="text-3xl font-black text-gravel-dark tracking-tight" id="kpiJual">Rp 0</h2>
                        </div>
                        <div class="data-card p-8 border-l-4 border-gravel-amber">
                            <p class="text-[10px] font-bold text-gravel-amber uppercase tracking-widest mb-2">Estimasi Zakat Mal</p>
                            <h2 class="text-3xl font-black text-gravel-dark tracking-tight" id="kpiZakat">Rp 0</h2>
                        </div>
                        <div class="data-card p-8 bg-gravel-green text-white">
                            <p class="text-[10px] font-bold text-white/60 uppercase tracking-widest mb-2">Status Syariah</p>
                            <div class="flex items-center gap-2">
                                <i class="fas fa-check-circle text-gravel-gold"></i>
                                <span class="font-bold">AKAD TERVERIFIKASI</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="pos" class="page-content">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="menuGrid"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="notif" class="fixed top-10 right-10 translate-x-[150%] transition-all duration-500 bg-white shadow-2xl rounded-2xl p-6 border-l-4 border-gravel-amber z-[100] flex items-center gap-4">
        <div id="notifMsg" class="text-sm font-bold text-gravel-dark"></div>
    </div>

    <script>
        // AUTH LOGIC
        function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('userID').value;
            const pass = document.getElementById('userPass').value;

            // Simple validation (bisa diganti sesuai kebutuhan)
            if(id && pass) {
                document.getElementById('displayUser').innerText = id;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'flex';
                initDashboard();
                notify("Login Berhasil. Selamat bekerja!");
            }
        }

        function logout() {
            location.reload(); // Reset state
        }

        // UI LOGIC
        function showPage(pageId, btn) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('pageTitle').innerText = pageId === 'overview' ? 'Overview Bisnis' : 'Kasir Part';
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            if(btn) btn.classList.add('active');
        }

        function notify(msg) {
            const n = document.getElementById('notif');
            document.getElementById('notifMsg').innerText = msg;
            n.style.transform = "translateX(0)";
            setTimeout(() => n.style.transform = "translateX(150%)", 3000);
        }

        function initDashboard() {
            document.getElementById('tanggal').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            // Render menu dan data lainnya di sini...
        }
    </script>
</body>
</html>
